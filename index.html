<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Obra - Relatório PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --blue: #2980b9;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; text-transform: uppercase; }
        
        /* Formulário */
        .input-group { 
            display: grid; 
            grid-template-columns: 1fr 2fr 1fr 1fr auto; 
            gap: 10px; 
            margin-bottom: 30px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .input-field { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        
        .actions { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        
        .btn-add { background-color: var(--secondary); color: white; padding: 10px 20px; }
        .btn-pdf { background-color: var(--blue); color: white; padding: 10px 20px; display: flex; align-items: center; gap: 8px; }
        .btn-del { background-color: #e74c3c; color: white; padding: 6px 12px; font-size: 11px; }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabela */
        #area-impressao { padding: 10px; } /* Área que será capturada pelo PDF */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .total-row { background-color: #2c3e50 !important; color: white; font-size: 1.2em; }
        .valor { text-align: right; font-weight: bold; }
