<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Materiais - Permanente</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #f39c12;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Formulário */
        .input-group { 
            display: grid; 
            grid-template-columns: 1.5fr 2fr 1fr 1.2fr auto; 
            gap: 12px; 
            margin-bottom: 30px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .input-field { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-add { background-color: var(--secondary); color: white; padding: 0 25px; height: 45px; align-self: flex-end; }
        .btn-add:hover { background-color: #219150; transform: translateY(-1px); }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: var(--primary); color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background-color: #fcfcfc; }
        
        .total-row { background-color: #2c3e50 !important; color: white; font-size: 1.3em; }
        .valor { text-align: right; font-family: 'Courier New', monospace; font-weight: bold; }
        .btn-del { background-color: #e74c3c; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-del:hover { background-color: #c0392b; }

        .empty-msg { text-align: center; padding: 20px; color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Acompanhamento de Obra</h2>

    <div class="input-group">
        <div class="input-field">
            <label>Data</label>
            <input type="date" id="dataCompra">
        </div>
        <div class="input-field">
            <label>Material</label>
            <input type="text" id="material" placeholder="Ex: Areia grossa">
        </div>
        <div class="input-field">
            <label>Qtd</label>
            <input type="number" id="quantidade" placeholder="0">
        </div>
        <div class="input-field">
            <label>V. Unitário</label>
            <input type="number" id="valorUnit" placeholder="0.00" step="0.01">
        </div>
        <button class="btn-add" onclick="adicionarItem()">CADASTRAR</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Material</th>
                <th>Qtd</th>
                <th>Unitário</th>
                <th class="valor">Total Item</th>
                <th style="text-align: center;">Ação</th>
            </tr>
        </thead>
        <tbody id="listaMateriais"></tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="4" style="text-align: right;">TOTAL ACUMULADO DA OBRA:</td>
                <td id="totalGlobal" class="valor">R$ 0,00</td>
                <td></td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    let dbMateriais = JSON.parse(localStorage.getItem('obra_dados')) || [];

    // Formata data de YYYY-MM-DD para DD/MM/YYYY
    function formatarData(data) {
        if(!data) return "-";
        const partes = data.split("-");
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
    }

    function renderizarTabela() {
        const tabela = document.getElementById('listaMateriais');
        tabela.innerHTML = '';
        let somaTotal = 0;

        if (dbMateriais.length === 0) {
            tabela.innerHTML = '<tr><td colspan="6" class="empty-msg">Nenhum material registrado ainda.</td></tr>';
        }

        dbMateriais.forEach((item, index) => {
            const totalItem = item.qtd * item.valorUnit;
            somaTotal += totalItem;

            const linha = `
                <tr>
                    <td>${formatarData(item.data)}</td>
                    <td><strong>${item.material}</strong></td>
                    <td>${item.qtd}</td>
                    <td>${formatarMoeda(item.valorUnit)}</td>
                    <td class="valor">${formatarMoeda(totalItem)}</td>
                    <td style="text-align: center;">
                        <button class="btn-del" onclick="removerItem(${index})">Remover</button>
                    </td>
                </tr>
            `;
            tabela.innerHTML += linha;
        });

        document.getElementById('totalGlobal').innerText = formatarMoeda(somaTotal);
        localStorage.setItem('obra_dados', JSON.stringify(dbMateriais));
    }

    function adicionarItem() {
        const data = document.getElementById('dataCompra').value;
        const material = document.getElementById('material').value;
        const qtd = parseFloat(document.getElementById('quantidade').value);
        const valorUnit = parseFloat(document.getElementById('valorUnit').value);

        if (!material || isNaN(qtd) || isNaN(valorUnit)) {
            alert("Preencha os campos de Material, Quantidade e Valor!");
            return;
        }

        const novoItem = { data, material, qtd, valorUnit };
        dbMateriais.push(novoItem);
        
        renderizarTabela();
        
        // Limpar campos
        document.getElementById('material').value = '';
        document.getElementById('quantidade').value = '';
        document.getElementById('valorUnit').value = '';
    }

    function removerItem(index) {
        if(confirm("Deseja remover este item?")) {
            dbMateriais.splice(index, 1);
            renderizarTabela();
        }
    }

    // Inicializar tabela ao carregar página
    window.onload = renderizarTabela;
</script>

</body>
</html>
