<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Obra - Relatório PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --blue: #2980b9;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 10px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Formulário Responsivo */
        .input-group { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 12px; 
            margin-bottom: 20px; 
            background: #f9f9f9; 
            padding: 15px; 
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .input-field { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        
        .actions { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; flex-wrap: wrap; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; padding: 12px 20px; }
        
        .btn-add { background-color: var(--secondary); color: white; }
        .btn-pdf { background-color: var(--blue); color: white; display: flex; align-items: center; gap: 8px; }
        .btn-del { background-color: #e74c3c; color: white; padding: 6px 12px; font-size: 11px; }
        
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabela */
        #area-impressao { overflow-x: auto; padding: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .total-row { background-color: #2c3e50 !important; color: white; font-size: 1.1em; }
        .valor { text-align: right; font-weight: bold; font-family: monospace; }
        .empty-msg { text-align: center; padding: 20px; color: #999; font-style: italic; }

        /* Esconder na impressão do PDF */
        .no-print { text-align: center; }

        @media (max-width: 600px) {
            h2 { font-size: 1.2rem; }
            .btn-add, .btn-pdf { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Acompanhamento de Obra</h2>

    <div class="input-group">
        <div class="input-field">
            <label>Data</label>
            <input type="date" id="dataCompra">
        </div>
        <div class="input-field">
            <label>Material</label>
            <input type="text" id="material" placeholder="Cimento, Areia...">
        </div>
        <div class="input-field">
            <label>Qtd</label>
            <input type="number" id="quantidade" placeholder="0">
        </div>
        <div class="input-field">
            <label>V. Unitário</label>
            <input type="number" id="valorUnit" step="0.01" placeholder="0.00">
        </div>
        <button class="btn-add" onclick="adicionarItem()">CADASTRAR</button>
    </div>

    <div class="actions">
        <button class="btn-pdf" onclick="gerarPDF()">
            📄 GERAR RELATÓRIO PDF
        </button>
    </div>

    <div id="area-impressao">
        <h3 id="titulo-pdf" style="display:none; text-align:center; padding: 10px;">Relatório de Gastos da Obra</h3>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Material</th>
                    <th>Qtd</th>
                    <th>Unitário</th>
                    <th class="valor">Total Item</th>
                    <th class="no-print">Ação</th>
                </tr>
            </thead>
            <tbody id="listaMateriais"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="4" style="text-align: right;">TOTAL ACUMULADO:</td>
                    <td id="totalGlobal" class="valor">R$ 0,00</td>
                    <td class="no-print"></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    let dbMateriais = JSON.parse(localStorage.getItem('obra_dados')) || [];

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
    }

    function renderizarTabela() {
        const tabela = document.getElementById('listaMateriais');
        tabela.innerHTML = '';
        let somaTotal = 0;

        if (dbMateriais.length === 0) {
            tabela.innerHTML = '<tr><td colspan="6" class="empty-msg">Nenhum registro encontrado.</td></tr>';
        }

        dbMateriais.forEach((item, index) => {
            const totalItem = item.qtd * item.valorUnit;
            somaTotal += totalItem;
            tabela.innerHTML += `
                <tr>
                    <td>${item.data ? item.data.split('-').reverse().join('/') : '-'}</td>
                    <td><strong>${item.material}</strong></td>
                    <td>${item.qtd}</td>
                    <td>${formatarMoeda(item.valorUnit)}</td>
                    <td class="valor">${formatarMoeda(totalItem)}</td>
                    <td class="no-print">
                        <button class="btn-del" onclick="removerItem(${index})">Remover</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById('totalGlobal').innerText = formatarMoeda(somaTotal);
        localStorage.setItem('obra_dados', JSON.stringify(dbMateriais));
    }

    function adicionarItem() {
        const data = document.getElementById('dataCompra').value;
        const material = document.getElementById('material').value;
        const qtd = parseFloat(document.getElementById('quantidade').value);
        const valorUnit = parseFloat(document.getElementById('valorUnit').value);

        if (!material || isNaN(qtd) || isNaN(valorUnit)) {
            alert("Por favor, preencha Material, Quantidade e Valor!");
            return;
        }

        dbMateriais.push({ data, material, qtd, valorUnit });
        renderizarTabela();
        
        // Limpa campos
        document.getElementById('material').value = '';
        document.getElementById('quantidade').value = '';
        document.getElementById('valorUnit').value = '';
    }

    function removerItem(index) {
        if(confirm("Deseja excluir este item?")) {
            dbMateriais.splice(index, 1);
            renderizarTabela();
        }
    }

    function gerarPDF() {
        const elemento = document.getElementById('area-impressao');
        const titulo = document.getElementById('titulo-pdf');
        
        // Ajustes para o PDF
        titulo.style.display = 'block';
        const colsNoPrint = document.querySelectorAll('.no-print');
        colsNoPrint.forEach(c => c.style.display = 'none');

        const opt = {
            margin: 10,
            filename: `Obra_Relatorio_${new Date().toLocaleDateString()}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(elemento).save().then(() => {
            titulo.style.display = 'none';
            colsNoPrint.forEach(c => c.style.display = 'table-cell');
        });
    }

    window.onload = renderizarTabela;
</script>

</body>
</html>
